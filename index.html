<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>river.io</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero img {
      display: block;
      width: min(540px, 80vw);
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .hero p {
      position: absolute;
      margin: 0;
      color: #fff;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: clamp(1rem, 2.4vw, 1.6rem);
      letter-spacing: 0.32em;
      text-transform: lowercase;
      text-shadow:
        0 0 24px rgba(0, 0, 0, 0.85),
        0 0 10px rgba(0, 0, 0, 0.75),
        0 1px 2px rgba(0, 0, 0, 0.9);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hero">
    <img src="image.png" alt="Io" />
    <p>river.io</p>
  </div>
</body>
</html>
